        function buildSection() {
          var section = document.createElement('div');
          section.setAttribute('data-injected-section', 'studypie-app');
          section.style.cssText = [
            'position:absolute',
            'left:0',

            '<div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 18%,rgba(67,90,247,0.22),rgba(67,90,247,0) 34%);"></div>' +

            createShot(246, '퀴즈 풀기', 'phone-screen-quiz-DMkWs4CP.png', 'phone-frame-BiW8I2cs.png', 117, 196, 0, 18, '#ffffff');

          return section;
        }

        function insertSection() {
          if (inserted) return true;

          var target = document.querySelector('div[data-name="2"]');
          if (!target || !target.parentElement) return false;

          var parent = target.parentElement;
          if (parent.querySelector('div[data-injected-section="studypie-app"]')) {
            inserted = true;
            return true;
          }

          var children = Array.prototype.slice.call(parent.children);
          var section = buildSection();
          parent.insertBefore(section, target);

          children.forEach(function(child) {
            if (!child || child === section) return;
            var top = parseFloat(window.getComputedStyle(child).top);
            if (!isNaN(top) && top >= SECTION_TOP) {
              child.style.top = (top + SECTION_HEIGHT) + 'px';
            }
          });

          var parentHeight = parseFloat(window.getComputedStyle(parent).height);
          if (!isNaN(parentHeight)) {
            parent.style.height = (parentHeight + SECTION_HEIGHT) + 'px';
          }

          inserted = true;
          return true;
        }

        if (!insertSection()) {
          var obs = new MutationObserver(function(_, observer) {
            if (insertSection()) observer.disconnect();
          });
          obs.observe(document.body, { childList: true, subtree: true });
        }
